# agent opcode (https://github.com/dannyben/opcode)

build: GOCACHE=/tmp/fontview-go-cache go build .
#? Build with Go cache outside the shared folder

test: GOCACHE=/tmp/fontview-go-cache go test ./... "$@"
#? Run tests with Go cache outside the shared folder

check:
  GOCACHE=/tmp/fontview-go-cache gofmt -w .
  GOCACHE=/tmp/fontview-go-cache go vet ./...
  GOCACHE=/tmp/fontview-go-cache go test ./...
#? Format, vet, and test with Go cache outside the shared folder
