## Core

build: go build -ldflags "-X main.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" -o fontview .
#? build the binary

fontview: go run . "$@"
#? run the CLI without building

serve: go run . "$@"
#? start the local font viewer server

html: go run . --html "$@"
#? write a standalone HTML report

## Testing & Linting

test: go test ./... "$@"
#? run tests

fmt: gofmt -w .
#? format code

vet: go vet ./...
#? check for suspicious code patterns and likely mistakes

check:
  gofmt -w .
  go vet ./...
  go test ./...
#? format, vet, and test everything

## Dependencies

tidy: go mod tidy
#? clean up and sync dependencies

verify: go mod verify
#? verify dependencies match checksums
