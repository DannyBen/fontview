<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <style>{{.Styles}}</style>
</head>
<body>
  <header class="app-header">
    <div class="toolbar">
      <div class="segmented" aria-label="View">
        <button class="segmented-button is-active" type="button" data-view="type">Type</button>
        <button class="segmented-button" type="button" data-view="map">Map</button>
      </div>
      <select class="font-select" id="fontSelect" aria-label="Font"></select>
      <select class="compact-select" id="categorySelect" aria-label="Category"></select>
      <select class="compact-select" id="sizeSelect" aria-label="Size">
        <option value="24">24px</option>
        <option value="28">28px</option>
        <option value="34">34px</option>
        <option value="44">44px</option>
        <option value="56">56px</option>
        <option value="72" selected>72px</option>
        <option value="96">96px</option>
        <option value="128">128px</option>
        <option value="160">160px</option>
        <option value="192">192px</option>
      </select>
      <select class="compact-select" id="weightSelect" aria-label="Weight">
        <option value="100">100</option>
        <option value="200">200</option>
        <option value="300">300</option>
        <option value="400" selected>400</option>
        <option value="500">500</option>
        <option value="600">600</option>
        <option value="700">700</option>
        <option value="800">800</option>
        <option value="900">900</option>
      </select>
      <button class="style-button" id="boldButton" type="button" aria-pressed="false" title="Bold">B</button>
      <button class="style-button italic" id="italicButton" type="button" aria-pressed="false" title="Italic">I</button>
      <input class="search-input" id="searchInput" type="search" aria-label="Search" placeholder="Search">
      <div class="meta" id="fontMeta"></div>
    </div>
  </header>
  <main>
    <section class="view is-active" id="typeView" data-view-panel="type">
      <textarea id="sampleText" spellcheck="false">The quick brown fox jumps over 12345.</textarea>
    </section>
    <section class="view" id="mapView" data-view-panel="map">
      <div id="content"></div>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>const fonts = {{.Fonts}};</script>
  <script>{{.Script}}</script>
</body>
</html>
